name: Pendle cloud monitor

on:
  push:
    branches:
      - monitor-data
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pendle-cloud-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Wait for next five-minute sample
        if: github.event_name == 'push' && github.ref == 'refs/heads/monitor-data'
        shell: bash
        run: sleep 300

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Restore latest state
        shell: bash
        run: |
          if git fetch origin monitor-data; then
            git show origin/monitor-data:state.json > "$RUNNER_TEMP/state.json"
          else
            echo '{}' > "$RUNNER_TEMP/state.json"
          fi

      - name: Fetch Pendle data and notify Telegram
        shell: pwsh
        env:
          PENDLE_CHAIN_ID: "143"
          PENDLE_MARKET: "0x6f99cf00ee7290ae78a072bb6910ef72d1129fe7"
          PENDLE_WALLET: "0x7bc616f0a9d40061357de0bff8bf42117057165e"
          MIN_USD_CHANGE: "1"
          MIN_APY_CHANGE_PP: "0.01"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./cloud-monitor.ps1 -StatePath "$env:RUNNER_TEMP/state.json"

      - name: Publish state branch
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$MONITOR_DEPLOY_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"
          mkdir "$RUNNER_TEMP/publish"
          mkdir -p "$RUNNER_TEMP/publish/.github/workflows"
          cp "$RUNNER_TEMP/state.json" "$RUNNER_TEMP/publish/state.json"
          cp "$GITHUB_WORKSPACE/.github/workflows/pendle-monitor.yml" "$RUNNER_TEMP/publish/.github/workflows/pendle-monitor.yml"
          cd "$RUNNER_TEMP/publish"
          git init
          git checkout -b monitor-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update Pendle monitor state"
          git remote add origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git push --force origin monitor-data
        env:
          MONITOR_DEPLOY_KEY: ${{ secrets.MONITOR_DEPLOY_KEY }}
